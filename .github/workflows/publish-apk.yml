name: Build and publish APK

concurrency:
  group: publish-apk-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore google-services.json from secret
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "❌ Secret GOOGLE_SERVICES_JSON não configurado."
            echo "Crie o secret com o conteúdo completo do arquivo app/google-services.json"
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Copy APK to stable download path
        run: |
          mkdir -p app/release
          cp app/build/outputs/apk/debug/app-debug.apk app/release/app-release.apk

      - name: Upload APK artifact (PRs/main)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/release/app-release.apk

      - name: Commit APK to repository (push main/manual)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'ci: update downloadable APK [skip ci]'
          file_pattern: app/release/app-release.apk
